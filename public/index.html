<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LBROWN-MicroSystems</title>
    <!-- Google Fonts para tipografía premium -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Librerías Globales Estables desde Cloudflare -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="manifest" href="/manifest.json" />
    <style>
        :root {
            --primary: #1e3a8a;
            --primary-light: #3b82f6;
            --secondary: #10b981;
            --secondary-dark: #047857;
            --danger: #ef4444;
            --danger-dark: #b91c1c;
            --warning: #f59e0b;
            --warning-dark: #d97706;
            --dark-bg: #0b0f19;
            --dark-card: rgba(22, 28, 45, 0.8);
            --dark-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --shadow-premium: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-main);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background-image: 
                radial-gradient(at 0% 0%, rgba(30, 58, 138, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.08) 0px, transparent 50%);
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        header {
            text-align: center;
            padding: 10px 0;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa 0%, #10b981 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        header p {
            font-size: 0.9rem;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--dark-card);
            border: 1px solid var(--dark-border);
            border-radius: 16px;
            padding: 24px;
            box-shadow: var(--shadow-premium);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            gap: 20px;
            transition: var(--transition);
        }

        .card:hover {
            border-color: rgba(255, 255, 255, 0.12);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--dark-border);
            padding-bottom: 16px;
        }

        .card-header h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
        }

        .driver-header h2 {
            color: var(--secondary);
        }

        .passenger-header h2 {
            color: var(--primary-light);
        }

        /* Pulsos de Estado */
        .pulse-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            position: relative;
        }

        .pulse-indicator.green {
            background-color: var(--secondary);
            box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
        }

        .pulse-indicator.green.active {
            animation: pulse-green 1.5s infinite;
        }

        .pulse-indicator.blue {
            background-color: var(--primary-light);
            box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7);
            animation: pulse-blue 2s infinite;
        }

        @keyframes pulse-green {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
            }
            70% {
                transform: scale(1);
                box-shadow: 0 0 0 10px rgba(16, 185, 129, 0);
            }
            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0);
            }
        }

        @keyframes pulse-blue {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7);
            }
            70% {
                transform: scale(1);
                box-shadow: 0 0 0 10px rgba(59, 130, 246, 0);
            }
            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(59, 130, 246, 0);
            }
        }

        /* Botones Premium */
        .btn {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            padding: 12px 24px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            width: 100%;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--secondary) 0%, var(--secondary-dark) 100%);
            color: #fff;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(16, 185, 129, 0.3);
            filter: brightness(1.1);
        }

        .btn-warning-action {
            background: linear-gradient(135deg, var(--warning) 0%, var(--warning-dark) 100%);
            color: #fff;
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.2);
        }

        .btn-warning-action:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(245, 158, 11, 0.3);
            filter: brightness(1.1);
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--danger) 0%, var(--danger-dark) 100%);
            color: #fff;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2);
        }

        .btn-danger:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(239, 68, 68, 0.3);
            filter: brightness(1.1);
        }

        .btn:disabled {
            background: rgba(255, 255, 255, 0.08) !important;
            color: var(--text-muted) !important;
            cursor: not-allowed;
            box-shadow: none !important;
            transform: none !important;
        }

        .btn:active:not(:disabled) {
            transform: translateY(0);
        }

        /* Panel de PIN */
        .pin-container {
            margin-top: 10px;
            padding: 18px;
            border: 1px dashed var(--danger);
            border-radius: 12px;
            background: rgba(239, 68, 68, 0.05);
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            animation: fadeIn 0.3s ease-out;
        }

        .pin-title {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--danger);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .pin-inputs {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .pin-input {
            width: 80px;
            padding: 8px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 700;
            background: rgba(15, 23, 42, 0.8);
            border: 1.5px solid rgba(239, 68, 68, 0.3);
            color: var(--text-main);
            border-radius: 8px;
            letter-spacing: 2px;
            outline: none;
            transition: var(--transition);
        }

        .pin-input:focus {
            border-color: var(--danger);
            box-shadow: 0 0 8px rgba(239, 68, 68, 0.2);
        }

        .pin-btn-ok {
            background: var(--danger);
            color: white;
            border: none;
            padding: 10px 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: var(--transition);
        }

        .pin-btn-ok:hover {
            background: var(--danger-dark);
        }

        .pin-btn-cancel {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            border: none;
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: var(--transition);
        }

        .pin-btn-cancel:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        /* Displays de Información */
        .status-text {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-top: 5px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 5px;
        }

        .info-box {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--dark-border);
            border-radius: 10px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .info-box-full {
            grid-column: span 2;
        }

        .info-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .info-value {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .info-value-highlight {
            color: var(--primary-light);
        }

        .waiting-signal {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 145px;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-style: italic;
            border: 1px dashed var(--dark-border);
            border-radius: 10px;
            background: rgba(15, 23, 42, 0.2);
            text-align: center;
            padding: 10px;
        }

        /* Contenedor del Mapa */
        .map-wrapper {
            background: var(--dark-card);
            border: 1px solid var(--dark-border);
            border-radius: 16px;
            padding: 8px;
            box-shadow: var(--shadow-premium);
            width: 100%;
        }

        #mapa {
            width: 100% !important;
            height: 520px !important;
            display: block !important;
            position: relative !important;
            border-radius: 12px;
            border: none;
            z-index: 1;
        }

        /* Leaflet Dark mode layer overrides to match dark theme beautifully */
        .leaflet-container {
            background: #111a2e !important;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>LBROWN-MicroSystems</h1>
            <p>Control GPS de Recorridos de la UNAN - Managua</p>
        </header>

        <div class="dashboard-grid">
            <!-- Panel del Conductor -->
            <div class="card">
                <div class="card-header driver-header">
                    <span id="pulse-conductor" class="pulse-indicator green"></span>
                    <h2>Control Conductor</h2>
                </div>
                
                <div style="display: flex; flex-direction: column; gap: 10px;">
                    <button id="btn-viaje" class="btn btn-primary" onclick="solicitarPin('pausa')">Activar GPS</button>
                    <button id="btn-finalizar" class="btn btn-danger" onclick="solicitarPin('finalizar')" disabled>Finalizar Turno</button>
                </div>

                <div id="contenedor-pin" class="pin-container">
                    <p class="pin-title">🔒 PIN de Seguridad:</p>
                    <div class="pin-inputs">
                        <input type="password" id="input-pin" class="pin-input" maxlength="4" placeholder="••••">
                        <button class="pin-btn-ok" onclick="validarPin()">OK</button>
                        <button class="pin-btn-cancel" onclick="cancelarPin()">X</button>
                    </div>
                </div>

                <div>
                    <span class="info-label">Estado de Transmisión:</span>
                    <p id="envio-status" class="status-text" style="color: var(--danger);">Apagado</p>
                </div>
            </div>

            <!-- Panel del Pasajero / Supervisor -->
            <div class="card">
                <div class="card-header passenger-header">
                    <span class="pulse-indicator blue"></span>
                    <h2>Monitoreo en Tiempo Real</h2>
                </div>
                
                <div id="coordenadas-recibidas-panel">
                    <div id="coordenadas-recibidas" class="waiting-signal">Esperando señal de transmisión...</div>
                </div>
            </div>
        </div>

        <!-- Contenedor del Mapa -->
        <div class="map-wrapper">
            <div id="mapa"></div>
        </div>
    </div>

    <script>
        let socket = null;
        let watchId = null;
        let map = null;
        let marcadorVehiculo = null;
        let lineaTrayectoria = null;
        let marcadorSalida = null;
        let esPrimerPunto = true;
        
        const PIN_AUTORIZADO = "1234";
        const rutaId = "Ruta_Norte";
        let accionPending = ""; // Corregido nombre de la variable
        
        // Coordenadas base iniciales para Managua (UNAN)
        const latIn = 12.1136;
        const lngIn = -86.2241;

        document.addEventListener("DOMContentLoaded", () => {
            // Inicializar Socket.io
            if (typeof io !== 'undefined') socket = io();
            
            try {
                // Inicializar mapa de Leaflet
                map = L.map('mapa').setView([latIn, lngIn], 14);
                
                // Capa de mosaicos estándar de OpenStreetMap
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    maxZoom: 19,
                    crossOrigin: true,
                    attribution: '© OpenStreetMap'
                }).addTo(map);

                // Ícono personalizado de autobús (DivIcon con SVG inline — no depende de imágenes externas)
                const iconBus = L.divIcon({
                    className: '',
                    html: `<div style="
                        width:44px; height:44px;
                        background: linear-gradient(135deg,#1e3a8a,#3b82f6);
                        border-radius:50%;
                        display:flex; align-items:center; justify-content:center;
                        font-size:24px; line-height:1;
                        box-shadow: 0 3px 10px rgba(30,58,138,0.6);
                        border: 2px solid rgba(255,255,255,0.3);
                    ">🚌</div>`,
                    iconSize: [44, 44],
                    iconAnchor: [22, 22],
                    popupAnchor: [0, -24]
                });

                // Marcador principal con ícono de bus y trazado de línea
                marcadorVehiculo = L.marker([latIn, lngIn], { icon: iconBus }).addTo(map).bindPopup("🚌 Autobús UNAN");
                lineaTrayectoria = L.polyline([], { color: '#3b82f6', weight: 6, opacity: 0.85, lineJoin: 'round' }).addTo(map);
                
                // Ajustar visualización del mapa al cargar
                setTimeout(() => { if (map) map.invalidateSize(true); }, 400);
            } catch (e) { 
                console.error("Error al montar mapa inicial:", e); 
            }

            if (socket) {
                // Escuchar la transmisión del chofer en tiempo real (Vista del Pasajero / Supervisor)
                socket.on(`usuario_recibe_ruta_${rutaId}`, (d) => {
                    // Si el dispositivo actual es el conductor que está transmitiendo, ignorar la retransmisión
                    if (watchId !== null) return;

                    const latNum = parseFloat(d.lat);
                    const lngNum = parseFloat(d.lng);
                    const pos = [latNum, lngNum];
                    
                    if (esPrimerPunto) {
                        esPrimerPunto = false;
                        marcadorSalida = L.circleMarker(pos, { radius: 8, fillColor: "#10b981", color: "#fff", weight: 2, fillOpacity: 1 }).addTo(map).bindPopup("Salida de Terminal");
                        map.setView(pos, 16);
                    }
                    
                    document.getElementById('coordenadas-recibidas').innerHTML = `
                        <div class="info-grid">
                            <div class="info-box">
                                <span class="info-label">Latitud</span>
                                <span class="info-value">${latNum.toFixed(5)}</span>
                            </div>
                            <div class="info-box">
                                <span class="info-label">Longitud</span>
                                <span class="info-value">${lngNum.toFixed(5)}</span>
                            </div>
                            <div class="info-box">
                                <span class="info-label">Velocidad</span>
                                <span class="info-value info-value-highlight">${d.velocidad || 0} km/h</span>
                            </div>
                            <div class="info-box">
                                <span class="info-label">Precisión GPS</span>
                                <span class="info-value">±${d.precision || 0}m</span>
                            </div>
                            <div class="info-box info-box-full">
                                <span class="info-label">Último Reporte (Servidor)</span>
                                <span class="info-value" style="font-size: 0.85rem; color: var(--text-muted);">${d.ultimaActualizacion || ''}</span>
                            </div>
                        </div>
                    `;
                    
                    if (map) {
                        if (marcadorVehiculo) marcadorVehiculo.setLatLng(pos);
                        if (lineaTrayectoria) lineaTrayectoria.addLatLng(pos);
                        map.panTo(pos);
                    }
                });

                socket.on('limpiar_mapa_pasajeros', () => {
                    esPrimerPunto = true;
                    if (lineaTrayectoria) lineaTrayectoria.setLatLngs([]);
                    if (marcadorSalida) { map.removeLayer(marcadorSalida); marcadorSalida = null; }
                    document.getElementById('coordenadas-recibidas').innerHTML = `<div class="waiting-signal">Esperando señal de transmisión...</div>`;
                    if (map) map.setView([latIn, lngIn], 14);
                });
            }
        });

        // Actualiza el mapa y la interfaz en tiempo real en la pantalla del propio conductor
        function enviarGps(p) {
            const lat = p.coords.latitude;
            const lng = p.coords.longitude;
            const acc = Math.round(p.coords.accuracy);
            let vel = p.coords.speed ? Math.round(p.coords.speed * 3.6) : 0;

            const pos = [parseFloat(lat.toFixed(6)), parseFloat(lng.toFixed(6))];
            
            const statusEl = document.getElementById('envio-status');
            statusEl.innerText = "Transmitiendo EN VIVO 🛰️";
            statusEl.style.color = "var(--secondary)";
            
            document.getElementById('coordenadas-recibidas').innerHTML = `
                <div class="info-grid">
                    <div class="info-box">
                        <span class="info-label">Latitud</span>
                        <span class="info-value">${lat.toFixed(5)}</span>
                    </div>
                    <div class="info-box">
                        <span class="info-label">Longitud</span>
                        <span class="info-value">${lng.toFixed(5)}</span>
                    </div>
                    <div class="info-box">
                        <span class="info-label">Velocidad</span>
                        <span class="info-value info-value-highlight">${vel} km/h</span>
                    </div>
                    <div class="info-box">
                        <span class="info-label">Precisión GPS</span>
                        <span class="info-value">±${acc}m</span>
                    </div>
                    <div class="info-box info-box-full" style="text-align: center; border-color: rgba(16, 185, 129, 0.3); background: rgba(16, 185, 129, 0.05);">
                        <span class="info-value" style="color: var(--secondary); font-size: 0.85rem;">Transmitiendo coordenadas locales en vivo</span>
                    </div>
                </div>
            `;

            if (map) {
                if (esPrimerPunto) {
                    esPrimerPunto = false;
                    marcadorSalida = L.circleMarker(pos, { radius: 8, fillColor: "#10b981", color: "#fff", weight: 2, fillOpacity: 1 }).addTo(map).bindPopup("Salida de Terminal");
                    map.setView(pos, 16);
                }
                if (marcadorVehiculo) marcadorVehiculo.setLatLng(pos);
                if (lineaTrayectoria) lineaTrayectoria.addLatLng(pos);
                map.panTo(pos);
            }

            if (socket) {
                socket.emit('conductor_envia_coordenadas', {
                    rutaId: rutaId,
                    lat: pos[0],
                    lng: pos[1],
                    velocidad: vel,
                    precision: acc
                });
            }
        }

        function solicitarPin(t) {
            if (watchId === null && t === 'pausa') { arrancarGps(); return; }
            accionPending = t;
            
            const pinContainer = document.getElementById('contenedor-pin');
            pinContainer.style.display = 'flex';
            document.getElementById('input-pin').value = '';
            document.getElementById('input-pin').focus();
        }

        function validarPin() {
            if (document.getElementById('input-pin').value === PIN_AUTORIZADO) {
                document.getElementById('contenedor-pin').style.display = 'none';
                if (accionPending === 'pausa') apagarGps();
                else if (accionPending === 'finalizar') cerrarTurno();
            } else {
                alert("PIN Incorrecto.");
                cancelarPin();
            }
        }

        function cancelarPin() { 
            document.getElementById('contenedor-pin').style.display = 'none'; 
            accionPending = ""; 
        }
        
        function arrancarGps() {
            const b1 = document.getElementById('btn-viaje'), b2 = document.getElementById('btn-finalizar');
            b1.innerText = "Pausar GPS"; 
            b1.className = "btn btn-warning-action";
            b2.removeAttribute('disabled');
            
            const pulseCond = document.getElementById('pulse-conductor');
            pulseCond.classList.add('active');
            
            const opt = { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 };
            
            navigator.geolocation.getCurrentPosition((p) => {
                enviarGps(p);
                watchId = navigator.geolocation.watchPosition(enviarGps, (e) => console.error(e), opt);
            }, (e) => {
                console.error(e);
                apagarGps();
            }, opt);
        }
        
        function apagarGps() {
            if (watchId) navigator.geolocation.clearWatch(watchId); 
            watchId = null;
            
            const b1 = document.getElementById('btn-viaje');
            b1.innerText = "Activar GPS";
            b1.className = "btn btn-primary";
            
            const pulseCond = document.getElementById('pulse-conductor');
            pulseCond.classList.remove('active');
            
            const statusEl = document.getElementById('envio-status');
            statusEl.innerText = "Estado: Apagado";
            statusEl.style.color = "var(--danger)";
        }

        function cerrarTurno() {
            apagarGps();
            const b2 = document.getElementById('btn-finalizar');
            b2.setAttribute('disabled', 'true');
            esPrimerPunto = true;
            if (lineaTrayectoria) lineaTrayectoria.setLatLngs([]);
            if (marcadorSalida) { map.removeLayer(marcadorSalida); marcadorSalida = null; }
            document.getElementById('coordenadas-recibidas').innerHTML = `<div class="waiting-signal">Esperando señal de transmisión...</div>`;
            if (socket) socket.emit('finalizar_viaje_limpiar_bitacora');
        }

        // Registro de Service Worker para soporte Offline / PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker registrado con éxito:', reg.scope))
                    .catch(err => console.error('Error al registrar Service Worker:', err));
            });
        }
    </script>
</body>
