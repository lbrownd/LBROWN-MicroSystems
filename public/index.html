<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LBROWN Microsystems GPS</title>
    <!-- Librerías Globales Estables desde Cloudflare (Inmunes a caídas de disco) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="manifest" href="/manifest.json" />
    <style>
        /* Estilos base limpios para forzar que Leaflet no oculte las imágenes */
        #mapa { width: 100% !important; height: 500px !important; display: block !important; position: relative !important; }
    </style>
</head>
<body style="font-family: Arial, sans-serif; padding: 15px; max-width: 1000px; margin: 0 auto; background-color: #f4f6f9;">
    <h2>Control GPS de Recorridos de la UNAN - Managua</h2>
    
    <div style="display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 15px;">
        <!-- Panel del Conductor -->
        <div style="flex: 1; min-width: 280px; border: 1px solid #ccc; padding: 15px; border-radius: 8px; background: #fff;">
            <h3 style="margin-top: 0; color: #2e7d32;"> 🟢 Control Conductor</h3>
            <button id="btn-viaje" onclick="solicitarPin('pausa')" style="padding: 10px; background: #2e7d32; color: #fff; border: none; border-radius: 4px; font-weight: bold; width: 100%; cursor: pointer;">Activar GPS</button>
            <button id="btn-finalizar" onclick="solicitarPin('finalizar')" disabled style="padding: 10px; background: #9ca3af; color: #fff; border: none; border-radius: 4px; font-weight: bold; width: 100%; margin-top: 8px; cursor: not-allowed;">Finalizar Turno</button>
            <div id="contenedor-pin" style="margin-top: 10px; padding: 10px; border: 2px solid #ef4444; border-radius: 6px; background: #fef2f2; display: none; text-align: center;">
                <p style="margin: 0 0 8px; font-size: 12px; font-weight: bold; color: #991b1b;">PIN de Seguridad:</p>
                <input type="password" id="input-pin" maxlength="4" placeholder="••••" style="width: 60px; padding: 6px; text-align: center; border: 1px solid #f87171; border-radius: 4px; letter-spacing: 3px;">
                <button onclick="validarPin()" style="padding: 6px; background: #ef4444; color: #fff; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 12px; margin-left: 5px;">OK</button>
                <button onclick="cancelarPin()" style="padding: 6px; background: #6b7280; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; margin-left: 5px;">X</button>
            </div>
            <p id="envio-status" style="margin-top: 10px; font-weight: bold; font-size: 13px; margin-bottom: 0;">Estado: Apagado</p>
        </div>

        <!-- Panel del Pasajero / Supervisor -->
        <div style="flex: 1; min-width: 320px; border: 1px solid #ccc; padding: 15px; border-radius: 8px; background: #fff;">
            <h3 style="margin-top: 0; color: #1565c0;">🔵 Monitoreo de Recorridos UNAN-Managua</h3>
            <div id="coordenadas-recibidas" style="font-size: 14px; color: #333; line-height: 1.4; padding: 10px; background: #f1f5f9; border-radius: 6px;">Esperando señal...</div>
        </div>
    </div>

    <!-- Caja del mapa con dimensiones nativas de seguridad en el HTML -->
    <div id="mapa" style="width: 100%; height: 500px; min-height: 500px; display: block; border-radius: 8px; border: 1px solid #cbd5e1; margin-top: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);"></div>


    <!--INICIA EL BLOQUE NUMERO 2-->
        <script>
        let socket = null;
        let watchId = null;
        let map = null;
        let marcadorVehiculo = null;
        let lineaTrayectoria = null;
        let marcadorSalida = null;
        let esPrimerPunto = true;
        
        const PIN_AUTORIZADO = "1234";
        const rutaId = "Ruta_Norte";
        let accionPendiente = "";
        
        // Coordenadas base iniciales para Managua (UNAN)
        const latIn = 12.1136;
        const lngIn = -86.2241;

        document.addEventListener("DOMContentLoaded", () => {
            if (typeof io !== 'undefined') socket = io();
            
            try {
                // INICIALIZACIÓN DIRECTA (Inmune a cuadros grises): Monta el mapa en Managua al instante
                map = L.map('mapa').setView([latIn, lngIn], 14);
                
                // URL universal estándar de OpenStreetMap limpia y con su extensión .png en su lugar exacto
                           
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    maxZoom: 19,
                    crossOrigin: true,
                    attribution: '© OpenStreetMap'
                }).addTo(map);

                // Marcador e hilo nativo estándar de Leaflet estables sin arreglos vacíos
                marcadorVehiculo = L.marker([latIn, lngIn]).addTo(map).bindPopup("Autobús UNAN");
                lineaTrayectoria = L.polyline([], { color: '#2563eb', weight: 6, opacity: 0.85, lineJoin: 'round' }).addTo(map);
                
                // Forzar el redibujado geométrico para que se estire al 100% de la caja
                setTimeout(() => { if (map) map.invalidateSize(true); }, 400);
            } catch (e) { 
                console.error("Error al montar mapa inicial:", e); 
            }

            if (socket) {
                // Escuchar la transmisión del chofer en tiempo real (Vista del Pasajero / Supervisor)
               
                // Escuchar la transmisión del chofer en tiempo real (Vista del Pasajero / Supervisor)
socket.on(`usuario_recibe_ruta_${rutaId}`, (d) => {
    // SI ESTE CELULAR TIENE EL GPS ACTIVADO (ES EL CONDUCTOR), IGNORAMOS LA RETRANSMISIÓN
    if (watchId !== null) return;

    const latNum = parseFloat(d.lat);
    const lngNum = parseFloat(d.lng);
    const pos = [latNum, lngNum];
              
                    
                    if (esPrimerPunto) {
                        esPrimerPunto = false;
                        marcadorSalida = L.circleMarker(pos, { radius: 8, fillColor: "#10b981", color: "#fff", weight: 2, fillOpacity: 1 }).addTo(map).bindPopup("Salida de Terminal");
                        map.setView(pos, 16);
                    }
                    
                    document.getElementById('coordenadas-recibidas').innerHTML = `
                        <b>Ubicación Recibida (Pasajero):</b><br>
                        Lat: ${latNum.toFixed(5)} | Lng: ${lngNum.toFixed(5)}<br>
                        Vel: ${d.velocidad || 0} km/h<br>
                        <small>Error GPS: ±${d.precision || 0}m</small><br>
                        <small style="color: #64748b;">Último reporte: ${d.ultimaActualizacion || ''}</small>
                    `;
                    
                    if (map) {
                        if (marcadorVehiculo) marcadorVehiculo.setLatLng(pos);
                        if (lineaTrayectoria) lineaTrayectoria.addLatLng(pos);
                        map.panTo(pos);
                    }
                });

                socket.on('limpiar_mapa_pasajeros', () => {
                    esPrimerPunto = true;
                    if (lineaTrayectoria) lineaTrayectoria.setLatLngs([]);
                    if (marcadorSalida) { map.removeLayer(marcadorSalida); marcadorSalida = null; }
                    document.getElementById('coordenadas-recibidas').innerHTML = "Esperando señal...";
                    if (map) map.setView([latIn, lngIn], 14);
                });
            }
        });

       // <!-- INICIA EL BLOQUE NUMERO 3 -->

        // MAPEO LOCAL INMEDIATO (De tu idea original): Actualiza la pantalla del chofer sin retrasos
        function enviarGps(p) {
            const lat = p.coords.latitude;
            const lng = p.coords.longitude;
            const acc = Math.round(p.coords.accuracy);
            let vel = p.coords.speed ? Math.round(p.coords.speed * 3.6) : 0;

            const pos = [parseFloat(lat.toFixed(6)), parseFloat(lng.toFixed(6))];
            
            document.getElementById('envio-status').innerText = "Transmitiendo EN VIVO 🛰️ (" + acc + "m)";
            document.getElementById('envio-status').style.color = "#2e7d32";
            
            // Renderizado local instantáneo en la pantalla del propio celular del conductor
            document.getElementById('coordenadas-recibidas').innerHTML = `
                <b>Mi Ubicación Real (Conductor):</b><br>
                Lat: ${lat.toFixed(5)} | Lng: ${lng.toFixed(5)}<br>
                Vel: ${vel} km/h | Precision: ±${acc}m
            `;

            if (map) {
                if (esPrimerPunto) {
                    esPrimerPunto = false;
                    marcadorSalida = L.circleMarker(pos, { radius: 8, fillColor: "#10b981", color: "#fff", weight: 2, fillOpacity: 1 }).addTo(map).bindPopup("Salida de Terminal");
                    map.setView(pos, 16);
                }
                if (marcadorVehiculo) marcadorVehiculo.setLatLng(pos);
                if (lineaTrayectoria) lineaTrayectoria.addLatLng(pos);
                map.panTo(pos);
            }

            // Transmisión paralela limpia hacia el backend de Render con los números sueltos indexados
            if (socket) {
                socket.emit('conductor_envia_coordenadas', {
                    rutaId: rutaId,
                    lat: pos[0],
                    lng: pos[1],
                    velocidad: vel,
                    precision: acc
                });
            }
        }

        function solicitarPin(t) {
            if (watchId === null && t === 'pausa') { arrancarGps(); return; }
            accionPending = t;
            document.getElementById('contenedor-pin').style.display = 'block';
            document.getElementById('input-pin').value = '';
        }

        function validarPin() {
            if (document.getElementById('input-pin').value === PIN_AUTORIZADO) {
                document.getElementById('contenedor-pin').style.display = 'none';
                if (accionPending === 'pausa') apagarGps();
                else if (accionPending === 'finalizar') cerrarTurno();
            } else {
                alert("PIN Incorrecto.");
                cancelarPin();
            }
        }

        function cancelarPin() { 
            document.getElementById('contenedor-pin').style.display = 'none'; 
            accionPending = ""; 
        }
        
        function arrancarGps() {
            const b1 = document.getElementById('btn-viaje'), b2 = document.getElementById('btn-finalizar');
            b1.innerText = "Pausar GPS"; b1.style.background = "#d97706";
            b2.removeAttribute('disabled'); b2.style.cursor = 'pointer'; b2.style.background = '#c62828';
            const opt = { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 };
            
            // Disparo inicial instantáneo y radar continuo idéntico a tu idea original sin filtros restrictivos
            navigator.geolocation.getCurrentPosition((p) => {
                enviarGps(p);
                watchId = navigator.geolocation.watchPosition(enviarGps, (e) => console.error(e), opt);
            }, (e) => {
                console.error(e);
                apagarGps();
            }, opt);
        }
        
        function apagarGps() {
            if (watchId) navigator.geolocation.clearWatch(watchId); 
            watchId = null;
            document.getElementById('btn-viaje').innerText = "Activar GPS";
            document.getElementById('btn-viaje').style.background = "#2e7d32";
            document.getElementById('envio-status').innerText = "Estado: Apagado";
            document.getElementById('envio-status').style.color = "#ef4444";
        }

        function cerrarTurno() {
            apagarGps();
            const b2 = document.getElementById('btn-finalizar');
            b2.setAttribute('disabled', 'true'); b2.style.cursor = 'not-allowed'; b2.style.background = '#9ca3af';
            esPrimerPunto = true;
            if (lineaTrayectoria) lineaTrayectoria.setLatLngs([]);
            if (marcadorSalida) { map.removeLayer(marcadorSalida); marcadorSalida = null; }
            if (socket) socket.emit('finalizar_viaje_limpiar_bitacora');
        }
    </script>
</body>
</html>
